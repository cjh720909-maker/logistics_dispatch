{% extends "base.html" %}

{% block content %}

<div class="screen-box">

    <h5>150 업무규칙관리</h5>

    <div class="card mb-3">
        <div class="card-header">
            제품명 변경 규칙 등록
        </div>

        <div class="card-body">

            <form method="post" action="/rule_150">

                <div class="row">

                    <div class="col-md-4">
                        <label class="form-label">변경전 제품명</label>
                        <input type="text" name="before_name" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">변경후 제품명</label>
                        <input type="text" name="after_name" class="form-control" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">메모</label>
                        <input type="text" name="memo" class="form-control">
                    </div>

                    <div class="col-md-1 d-flex align-items-end">
                        <button class="btn btn-dark w-100">
                            등록
                        </button>
                    </div>

                </div>

            </form>

        </div>

    </div>

    <div class="mb-2">
        등록건수 : <strong>{{ rows|length }}</strong>
    </div>

    <table class="table table-bordered table-sm dispatch-table">

        <thead>

            <tr>
                <th style="width:70px;">번호</th>
                <th>변경전 제품명</th>
                <th>변경후 제품명</th>
                <th>메모</th>
                <th style="width:90px;">사용</th>
            </tr>

        </thead>

        <tbody>

            {% for row in rows %}

            <tr>

                <td>{{ row.id }}</td>

                <td>{{ row.before_name }}</td>

                <td>{{ row.after_name }}</td>

                <td>{{ row.memo }}</td>

                <td>
                    {% if row.is_active %}
                    사용
                    {% else %}
                    미사용
                    {% endif %}
                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
